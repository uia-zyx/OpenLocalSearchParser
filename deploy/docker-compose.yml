services:
  backend:
    build:
      context: ../apps/backend
    env_file:
      - ../.env.example
      - path: ../.env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant
      - redis
      - minio
      - llama-ocr
      - llama-embedding

  worker:
    build:
      context: ../apps/backend
    command: ["python", "-m", "app.worker"]
    env_file:
      - ../.env.example
      - path: ../.env
        required: false
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ../apps/frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: locascan
      POSTGRES_USER: locascan
      POSTGRES_PASSWORD: locascan
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  llama-ocr:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    gpus:
      - driver: nvidia
        count: all
        capabilities:
          - gpu
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--n-gpu-layers"
      - "999"
      - "--model"
      - "/models/GLM-OCR-Q8_0.gguf"
    volumes:
      - ../model:/models:ro

  llama-embedding:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    gpus:
      - driver: nvidia
        count: all
        capabilities:
          - gpu
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8081"
      - "--n-gpu-layers"
      - "999"
      - "--embedding"
      - "--pooling"
      - "last"
      - "--model"
      - "/models/Qwen3-Embedding-0.6B-Q8_0.gguf"
    volumes:
      - ../model:/models:ro

volumes:
  postgres_data:
  qdrant_data:
  minio_data:

